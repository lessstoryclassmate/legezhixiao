name: Cloud Server Deployment

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.prod.yml'
      - '.env.prod.example'
      - 'deploy-prod.sh'
  workflow_dispatch:
    inputs:
      target_server:
        description: '目标服务器 (staging/production)'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # 构建阶段
  build:
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.meta.outputs.backend-image }}
      frontend-image: ${{ steps.meta.outputs.frontend-image }}
      version: ${{ steps.meta.outputs.version }}
    
    steps:
    - name: 🚀 检出代码
      uses: actions/checkout@v4

    - name: 🐳 设置Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔐 登录到GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 📋 生成元数据
      id: meta
      run: |
        VERSION=${{ github.sha }}
        BACKEND_IMAGE="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${VERSION}"
        FRONTEND_IMAGE="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${VERSION}"
        
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "backend-image=${BACKEND_IMAGE}" >> $GITHUB_OUTPUT
        echo "frontend-image=${FRONTEND_IMAGE}" >> $GITHUB_OUTPUT

    - name: 🏗️ 构建后端镜像
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        target: production
        push: true
        tags: |
          ${{ steps.meta.outputs.backend-image }}
          ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

    - name: 🏗️ 构建前端镜像
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        target: production
        push: true
        tags: |
          ${{ steps.meta.outputs.frontend-image }}
          ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

    - name: 📝 生成部署清单
      run: |
        mkdir -p artifacts
        
        # 创建docker-compose.deploy.yml
        cat > artifacts/docker-compose.deploy.yml << EOF
        version: '3.8'
        
        services:
          backend:
            image: ${{ steps.meta.outputs.backend-image }}
            container_name: novel-editor-backend
            restart: unless-stopped
            environment:
              - DEBUG=false
              - ENVIRONMENT=production
              - SILICONFLOW_API_KEY=\${SILICONFLOW_API_KEY}
              - DEFAULT_AI_MODEL=\${DEFAULT_AI_MODEL:-deepseek-ai/DeepSeek-V3}
              - SECRET_KEY=\${SECRET_KEY}
              - DATABASE_URL=\${DATABASE_URL:-sqlite:///./novel_editor.db}
            volumes:
              - novel_editor_data:/app/data
              - ./logs:/app/logs
            ports:
              - "8000:8000"
            healthcheck:
              test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 40s
        
          frontend:
            image: ${{ steps.meta.outputs.frontend-image }}
            container_name: novel-editor-frontend
            restart: unless-stopped
            ports:
              - "80:80"
              - "443:443"
            volumes:
              - ./nginx/ssl:/etc/nginx/ssl:ro
            depends_on:
              - backend
            healthcheck:
              test: ["CMD", "curl", "-f", "http://localhost/health"]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 30s
        
        volumes:
          novel_editor_data:
            driver: local
        EOF
        
        # 创建部署脚本
        cat > artifacts/deploy.sh << 'EOF'
        #!/bin/bash
        set -e
        
        echo "🚀 开始部署AI小说编辑器..."
        
        # 检查环境变量
        if [[ -z "$SILICONFLOW_API_KEY" ]]; then
          echo "❌ 错误: 未设置SILICONFLOW_API_KEY环境变量"
          exit 1
        fi
        
        # 停止现有服务
        echo "⏹️ 停止现有服务..."
        docker-compose -f docker-compose.deploy.yml down || true
        
        # 清理未使用的镜像
        echo "🧹 清理Docker资源..."
        docker system prune -f
        
        # 拉取最新镜像
        echo "📥 拉取最新镜像..."
        docker-compose -f docker-compose.deploy.yml pull
        
        # 启动服务
        echo "🚀 启动服务..."
        docker-compose -f docker-compose.deploy.yml up -d
        
        # 等待服务启动
        echo "⏳ 等待服务启动..."
        sleep 30
        
        # 健康检查
        echo "🔍 执行健康检查..."
        max_attempts=10
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          if curl -f http://localhost:8000/health > /dev/null 2>&1; then
            echo "✅ 后端服务健康检查通过"
            break
          else
            echo "⏳ 等待后端服务启动... ($attempt/$max_attempts)"
            sleep 10
            ((attempt++))
          fi
        done
        
        if [ $attempt -gt $max_attempts ]; then
          echo "❌ 后端服务健康检查失败"
          docker-compose -f docker-compose.deploy.yml logs backend
          exit 1
        fi
        
        # 检查前端
        if curl -f http://localhost > /dev/null 2>&1; then
          echo "✅ 前端服务健康检查通过"
        else
          echo "⚠️ 前端服务可能需要更多时间启动"
        fi
        
        echo "🎉 部署完成！"
        echo "📊 服务状态:"
        docker-compose -f docker-compose.deploy.yml ps
        EOF
        
        chmod +x artifacts/deploy.sh

    - name: 📦 上传部署文件
      uses: actions/upload-artifact@v3
      with:
        name: deployment-files
        path: artifacts/

  # 部署到预发布环境
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_server == 'staging')
    environment: staging
    
    steps:
    - name: 📥 下载部署文件
      uses: actions/download-artifact@v3
      with:
        name: deployment-files
        path: ./deploy

    - name: 🚀 部署到预发布服务器
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: ${{ secrets.STAGING_PORT || 22 }}
        script_stop: true
        script: |
          # 创建部署目录
          mkdir -p ~/novel-editor-deploy
          cd ~/novel-editor-deploy
          
          # 备份当前版本
          if [ -f docker-compose.deploy.yml ]; then
            cp docker-compose.deploy.yml docker-compose.deploy.yml.backup.$(date +%Y%m%d_%H%M%S)
          fi

    - name: 📁 传输部署文件
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: ${{ secrets.STAGING_PORT || 22 }}
        source: "deploy/*"
        target: "~/novel-editor-deploy/"
        strip_components: 1

    - name: 🔧 执行部署
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: ${{ secrets.STAGING_PORT || 22 }}
        script_stop: true
        script: |
          cd ~/novel-editor-deploy
          
          # 设置环境变量
          export SILICONFLOW_API_KEY="${{ secrets.SILICONFLOW_API_KEY }}"
          export SECRET_KEY="${{ secrets.SECRET_KEY }}"
          export DEFAULT_AI_MODEL="${{ secrets.DEFAULT_AI_MODEL || 'deepseek-ai/DeepSeek-V3' }}"
          export DATABASE_URL="${{ secrets.DATABASE_URL || 'sqlite:///./novel_editor.db' }}"
          
          # 执行部署
          chmod +x deploy.sh
          ./deploy.sh

    - name: 📊 部署状态报告
      uses: appleboy/ssh-action@v1.0.0
      if: always()
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: ${{ secrets.STAGING_PORT || 22 }}
        script: |
          cd ~/novel-editor-deploy
          echo "=== 服务状态 ==="
          docker-compose -f docker-compose.deploy.yml ps
          echo ""
          echo "=== 最近日志 ==="
          docker-compose -f docker-compose.deploy.yml logs --tail=50

  # 部署到生产环境
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_server == 'production')
    environment: production
    
    steps:
    - name: 📥 下载部署文件
      uses: actions/download-artifact@v3
      with:
        name: deployment-files
        path: ./deploy

    - name: 🚀 部署到生产服务器
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: ${{ secrets.PRODUCTION_PORT || 22 }}
        script_stop: true
        script: |
          # 创建部署目录
          mkdir -p ~/novel-editor-deploy
          cd ~/novel-editor-deploy
          
          # 备份当前版本
          if [ -f docker-compose.deploy.yml ]; then
            cp docker-compose.deploy.yml docker-compose.deploy.yml.backup.$(date +%Y%m%d_%H%M%S)
            
            # 创建数据库备份
            if docker-compose -f docker-compose.deploy.yml ps | grep backend > /dev/null; then
              echo "📄 备份数据库..."
              docker exec novel-editor-backend sqlite3 /app/novel_editor.db .dump > backup_$(date +%Y%m%d_%H%M%S).sql
            fi
          fi

    - name: 📁 传输部署文件
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: ${{ secrets.PRODUCTION_PORT || 22 }}
        source: "deploy/*"
        target: "~/novel-editor-deploy/"
        strip_components: 1

    - name: 🔧 执行生产部署
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: ${{ secrets.PRODUCTION_PORT || 22 }}
        script_stop: true
        script: |
          cd ~/novel-editor-deploy
          
          # 设置生产环境变量
          export SILICONFLOW_API_KEY="${{ secrets.PRODUCTION_SILICONFLOW_API_KEY }}"
          export SECRET_KEY="${{ secrets.PRODUCTION_SECRET_KEY }}"
          export DEFAULT_AI_MODEL="${{ secrets.PRODUCTION_DEFAULT_AI_MODEL || 'deepseek-ai/DeepSeek-V3' }}"
          export DATABASE_URL="${{ secrets.PRODUCTION_DATABASE_URL || 'sqlite:///./novel_editor.db' }}"
          
          # 执行部署
          chmod +x deploy.sh
          ./deploy.sh

    - name: 🔍 生产环境验证
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: ${{ secrets.PRODUCTION_PORT || 22 }}
        script: |
          cd ~/novel-editor-deploy
          
          # 等待服务完全启动
          sleep 60
          
          # 详细健康检查
          echo "🔍 执行详细健康检查..."
          
          # 检查容器状态
          if ! docker-compose -f docker-compose.deploy.yml ps | grep "Up" > /dev/null; then
            echo "❌ 容器状态异常"
            docker-compose -f docker-compose.deploy.yml ps
            exit 1
          fi
          
          # 检查后端API
          if ! curl -f http://localhost:8000/health > /dev/null 2>&1; then
            echo "❌ 后端健康检查失败"
            docker-compose -f docker-compose.deploy.yml logs backend
            exit 1
          fi
          
          # 检查AI功能
          AI_TEST_RESULT=$(curl -s -X POST "http://localhost:8000/api/v1/ai/models/test" \
            -H "Content-Type: application/json" \
            -d '{"model": "deepseek-ai/DeepSeek-V3"}' | jq -r '.status // "error"')
          
          if [ "$AI_TEST_RESULT" != "success" ]; then
            echo "⚠️ AI服务连接测试未通过，但不阻止部署"
          else
            echo "✅ AI服务连接正常"
          fi
          
          echo "🎉 生产环境部署验证完成！"

  # 部署通知
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
    - name: 📢 发送部署通知
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
        text: |
          AI小说编辑器部署完成
          
          📋 部署信息:
          • 版本: ${{ needs.build.outputs.version }}
          • 分支: ${{ github.ref }}
          • 提交: ${{ github.sha }}
          • 作者: ${{ github.actor }}
          
          🔗 访问地址:
          • 预发布: https://staging.your-domain.com
          • 生产环境: https://your-domain.com
          
          📊 状态:
          • 构建: ${{ needs.build.result }}
          • 预发布部署: ${{ needs.deploy-staging.result }}
          • 生产部署: ${{ needs.deploy-production.result }}

    - name: 📧 发送邮件通知
      uses: dawidd6/action-send-mail@v3
      if: failure()
      with:
        server_address: ${{ secrets.SMTP_SERVER }}
        server_port: ${{ secrets.SMTP_PORT }}
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "🚨 AI小说编辑器部署失败"
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: GitHub Actions <${{ secrets.SMTP_USERNAME }}>
        html_body: |
          <h2>🚨 部署失败通知</h2>
          
          <p><strong>仓库:</strong> ${{ github.repository }}</p>
          <p><strong>分支:</strong> ${{ github.ref }}</p>
          <p><strong>提交:</strong> ${{ github.sha }}</p>
          <p><strong>作者:</strong> ${{ github.actor }}</p>
          <p><strong>工作流:</strong> ${{ github.workflow }}</p>
          
          <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">查看详细日志</a></p>
          
          <p>请及时检查并修复问题。</p>
