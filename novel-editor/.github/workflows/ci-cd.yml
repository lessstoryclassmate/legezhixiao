name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend

jobs:
  # 代码质量检查
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        python-version: [3.11, 3.12]
    
    steps:
    - name: Checkout代码
      uses: actions/checkout@v4

    - name: 设置Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
        cache-dependency-path: frontend/yarn.lock

    - name: 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    # 前端测试
    - name: 安装前端依赖
      working-directory: ./frontend
      run: |
        yarn install --frozen-lockfile

    - name: 前端代码检查
      working-directory: ./frontend
      run: |
        yarn lint
        yarn type-check

    - name: 前端单元测试
      working-directory: ./frontend
      run: |
        yarn test:unit --coverage

    - name: 前端构建测试
      working-directory: ./frontend
      run: |
        yarn build

    # 后端测试
    - name: 安装后端依赖
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        python -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt
        pip install pytest pytest-cov black flake8 mypy

    - name: 后端代码格式检查
      working-directory: ./backend
      run: |
        source venv/bin/activate
        black --check .
        flake8 .

    - name: 后端类型检查
      working-directory: ./backend
      run: |
        source venv/bin/activate
        mypy . --ignore-missing-imports

    - name: 后端单元测试
      working-directory: ./backend
      run: |
        source venv/bin/activate
        pytest --cov=app --cov-report=xml

    # 上传测试覆盖率报告
    - name: 上传覆盖率到Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend

  # 安全扫描
  security-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - name: Checkout代码
      uses: actions/checkout@v4

    - name: 运行Trivy漏洞扫描
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: 上传Trivy扫描结果
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Docker镜像构建和推送
  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout代码
      uses: actions/checkout@v4

    - name: 设置Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 登录到Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 提取元数据 (后端)
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: 构建和推送后端镜像
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: 提取元数据 (前端)
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: 构建和推送前端镜像
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  # 部署到开发环境
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    environment: development
    
    steps:
    - name: Checkout代码
      uses: actions/checkout@v4

    - name: 设置kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: 配置K8S访问
      run: |
        echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: 更新部署清单
      run: |
        sed -i "s|IMAGE_TAG|${{ github.sha }}|g" deployment/k8s-manifest.yaml
        sed -i "s|ENVIRONMENT|development|g" deployment/k8s-manifest.yaml

    - name: 部署到开发环境
      run: |
        kubectl apply -f deployment/k8s-manifest.yaml
        kubectl rollout status deployment/novel-editor-backend -n development
        kubectl rollout status deployment/novel-editor-frontend -n development

    - name: 验证部署
      run: |
        kubectl get pods -n development
        kubectl get services -n development

  # 部署到生产环境
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout代码
      uses: actions/checkout@v4

    - name: 设置kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: 配置K8S访问
      run: |
        echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: 更新部署清单
      run: |
        sed -i "s|IMAGE_TAG|${{ github.sha }}|g" deployment/k8s-manifest.yaml
        sed -i "s|ENVIRONMENT|production|g" deployment/k8s-manifest.yaml

    - name: 部署到生产环境
      run: |
        kubectl apply -f deployment/k8s-manifest.yaml
        kubectl rollout status deployment/novel-editor-backend -n production
        kubectl rollout status deployment/novel-editor-frontend -n production

    - name: 验证部署
      run: |
        kubectl get pods -n production
        kubectl get services -n production

    - name: 健康检查
      run: |
        # 等待服务启动
        sleep 30
        # 检查后端健康状态
        kubectl exec -n production deployment/novel-editor-backend -- curl -f http://localhost:8000/health || exit 1
        # 检查前端是否可访问
        kubectl get service novel-editor-frontend -n production

  # 通知
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-prod]
    if: always()
    
    steps:
    - name: 部署结果通知
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
