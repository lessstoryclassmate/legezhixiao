name: 云服务器自动部署

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.prod.yml'
      - 'nginx/**'
      - '.env.prod.example'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # 构建和推送Docker镜像
  build-images:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    outputs:
      backend-image: ${{ steps.backend-meta.outputs.tags }}
      frontend-image: ${{ steps.frontend-meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 登录到GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 生成版本号
      id: meta
      run: |
        VERSION=$(echo ${{ github.sha }} | cut -c1-7)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "date=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

    - name: 构建后端镜像元数据
      id: backend-meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest
          type=raw,value=${{ steps.meta.outputs.version }}

    - name: 构建前端镜像元数据
      id: frontend-meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest
          type=raw,value=${{ steps.meta.outputs.version }}

    - name: 构建并推送后端镜像
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        target: production
        push: true
        tags: ${{ steps.backend-meta.outputs.tags }}
        labels: ${{ steps.backend-meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: 构建并推送前端镜像
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        target: production
        push: true
        tags: ${{ steps.frontend-meta.outputs.tags }}
        labels: ${{ steps.frontend-meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  # 部署到云服务器
  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    
    environment: 
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ vars.APP_URL || 'http://your-server-ip' }}
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置SSH密钥
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: 添加服务器到已知主机
      run: |
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: 创建部署目录
      run: |
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
          mkdir -p /opt/novel-editor
          sudo chown ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /opt/novel-editor
        "

    - name: 复制部署文件到服务器
      run: |
        scp -r docker-compose.prod.yml nginx/ deploy-prod.sh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/novel-editor/
        
        # 创建环境变量文件
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
          cd /opt/novel-editor
          cat > .env.prod << 'EOF'
        # AI服务配置
        SILICONFLOW_API_KEY=${{ secrets.SILICONFLOW_API_KEY }}
        DEFAULT_AI_MODEL=${{ vars.DEFAULT_AI_MODEL || 'deepseek-ai/DeepSeek-V3' }}
        SILICONFLOW_API_URL=${{ vars.SILICONFLOW_API_URL || 'https://api.siliconflow.cn/v1' }}
        
        # 应用配置
        DEBUG=false
        SECRET_KEY=${{ secrets.SECRET_KEY }}
        BACKEND_CORS_ORIGINS=${{ vars.BACKEND_CORS_ORIGINS || '*' }}
        
        # 数据库配置
        DATABASE_URL=${{ secrets.DATABASE_URL || 'sqlite:///./novel_editor.db' }}
        
        # Docker镜像配置
        BACKEND_IMAGE=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ needs.build-images.outputs.version }}
        FRONTEND_IMAGE=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ needs.build-images.outputs.version }}
        
        # 部署信息
        DEPLOY_VERSION=${{ needs.build-images.outputs.version }}
        DEPLOY_TIME=$(date '+%Y-%m-%d %H:%M:%S')
        DEPLOY_COMMIT=${{ github.sha }}
        EOF
        "

    - name: 登录到服务器Docker Registry
      run: |
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.DOCKER_REGISTRY }} -u ${{ github.actor }} --password-stdin
        "

    - name: 拉取最新镜像
      run: |
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
          cd /opt/novel-editor
          docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ needs.build-images.outputs.version }}
          docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ needs.build-images.outputs.version }}
        "

    - name: 部署应用
      run: |
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
          cd /opt/novel-editor
          chmod +x deploy-prod.sh
          
          # 停止现有服务
          ./deploy-prod.sh stop || true
          
          # 清理旧容器
          docker system prune -f
          
          # 使用新镜像启动服务
          export BACKEND_IMAGE=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ needs.build-images.outputs.version }}
          export FRONTEND_IMAGE=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ needs.build-images.outputs.version }}
          
          docker-compose -f docker-compose.prod.yml up -d
          
          # 等待服务启动
          sleep 30
          
          # 健康检查
          ./deploy-prod.sh health
        "

    - name: 验证部署
      run: |
        # 等待服务完全启动
        sleep 60
        
        # 检查服务状态
        HEALTH_URL="http://${{ secrets.SERVER_HOST }}:8000/health"
        echo "检查健康状态: $HEALTH_URL"
        
        for i in {1..5}; do
          if curl -f -s "$HEALTH_URL" > /dev/null; then
            echo "✅ 后端服务健康检查通过"
            break
          else
            echo "⏳ 等待后端服务启动... (尝试 $i/5)"
            sleep 15
          fi
        done
        
        # 检查前端服务
        FRONTEND_URL="http://${{ secrets.SERVER_HOST }}"
        echo "检查前端服务: $FRONTEND_URL"
        
        if curl -f -s "$FRONTEND_URL" > /dev/null; then
          echo "✅ 前端服务健康检查通过"
        else
          echo "❌ 前端服务健康检查失败"
          exit 1
        fi

    - name: 清理旧镜像
      run: |
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
          # 清理超过7天的旧镜像
          docker image prune -f --filter 'until=168h'
          
          # 清理未使用的容器
          docker container prune -f
        "

    - name: 发送部署通知
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "🎉 部署成功！"
          echo "版本: ${{ needs.build-images.outputs.version }}"
          echo "提交: ${{ github.sha }}"
          echo "访问地址: http://${{ secrets.SERVER_HOST }}"
        else
          echo "❌ 部署失败！"
          echo "请检查日志和服务状态"
        fi

  # 部署后测试
  post-deploy-tests:
    runs-on: ubuntu-latest
    needs: [build-images, deploy-to-server]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 等待服务稳定
      run: sleep 60

    - name: API功能测试
      run: |
        SERVER_URL="http://${{ secrets.SERVER_HOST }}:8000"
        
        # 测试健康检查
        echo "测试健康检查API..."
        curl -f "$SERVER_URL/health" | jq .
        
        # 测试API文档
        echo "测试API文档..."
        curl -f "$SERVER_URL/docs" > /dev/null
        
        # 测试AI模型列表
        echo "测试AI模型列表API..."
        curl -f "$SERVER_URL/api/v1/ai/models" | jq .

    - name: 前端功能测试
      run: |
        FRONTEND_URL="http://${{ secrets.SERVER_HOST }}"
        
        # 测试前端页面加载
        echo "测试前端页面..."
        response=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL")
        
        if [ "$response" -eq 200 ]; then
          echo "✅ 前端页面加载成功"
        else
          echo "❌ 前端页面加载失败 (HTTP $response)"
          exit 1
        fi

    - name: 性能基础测试
      run: |
        echo "执行基础性能测试..."
        
        # 测试API响应时间
        time curl -s "http://${{ secrets.SERVER_HOST }}:8000/health" > /dev/null
        
        # 测试前端首页加载时间
        time curl -s "http://${{ secrets.SERVER_HOST }}" > /dev/null
