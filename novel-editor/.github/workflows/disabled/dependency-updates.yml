name: Dependency Updates

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一凌晨2点运行
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'
        cache-dependency-path: frontend/yarn.lock

    - name: 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: 更新前端依赖
      working-directory: ./frontend
      run: |
        yarn upgrade --latest
        yarn audit --level high

    - name: 更新后端依赖
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip-review --local --auto

    - name: 运行测试
      run: |
        # 前端测试
        cd frontend
        yarn test:unit
        cd ..
        
        # 后端测试
        cd backend
        python -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt
        pip install pytest
        pytest
        cd ..

    - name: 创建Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update dependencies'
        title: '🔄 自动更新依赖包'
        body: |
          ## 依赖更新

          这是一个自动创建的PR，用于更新项目依赖包到最新版本。

          ### 更新内容
          - 前端依赖包更新
          - 后端依赖包更新

          ### 测试状态
          - ✅ 前端测试通过
          - ✅ 后端测试通过

          请仔细检查更新内容并测试相关功能。

        branch: chore/update-dependencies
        delete-branch: true

  security-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout代码
      uses: actions/checkout@v4

    - name: 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'
        cache-dependency-path: frontend/yarn.lock

    - name: 前端安全审计
      working-directory: ./frontend
      run: |
        yarn audit --level high --json > audit-report.json || true
        
    - name: 后端安全审计
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install safety
        safety check --json --output safety-report.json || true

    - name: 上传安全报告
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          frontend/audit-report.json
          backend/safety-report.json
