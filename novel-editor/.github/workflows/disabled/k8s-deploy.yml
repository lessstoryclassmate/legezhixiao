name: K8S Deployment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      KUBE_CONFIG:
        required: true

jobs:
  deploy-to-k8s:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
    - name: Checkout代码
      uses: actions/checkout@v4

    - name: 设置kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: 配置Kubernetes访问
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: 创建命名空间
      run: |
        kubectl create namespace ${{ inputs.environment }} --dry-run=client -o yaml | kubectl apply -f -

    - name: 配置ConfigMap和Secrets
      run: |
        # 创建配置文件
        kubectl create configmap novel-editor-config \
          --from-literal=ENVIRONMENT=${{ inputs.environment }} \
          --from-literal=DATABASE_URL="mysql://user:password@mysql:3306/novel_editor_${{ inputs.environment }}" \
          --namespace=${{ inputs.environment }} \
          --dry-run=client -o yaml | kubectl apply -f -

        # 创建密钥 (如果不存在)
        kubectl create secret generic novel-editor-secrets \
          --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
          --from-literal=SILICONFLOW_API_KEY="${{ secrets.SILICONFLOW_API_KEY }}" \
          --from-literal=MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}" \
          --namespace=${{ inputs.environment }} \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: 更新部署清单
      run: |
        # 替换镜像标签
        sed -i "s|IMAGE_TAG|${{ inputs.image_tag }}|g" deployment/k8s-manifest.yaml
        sed -i "s|ENVIRONMENT|${{ inputs.environment }}|g" deployment/k8s-manifest.yaml
        
        # 根据环境调整配置
        if [ "${{ inputs.environment }}" = "production" ]; then
          sed -i "s|replicas: 1|replicas: 3|g" deployment/k8s-manifest.yaml
          sed -i "s|resources:|resources:\n        requests:\n          memory: \"512Mi\"\n          cpu: \"500m\"\n        limits:\n          memory: \"1Gi\"\n          cpu: \"1000m\"|g" deployment/k8s-manifest.yaml
        fi

    - name: 部署到Kubernetes
      run: |
        kubectl apply -f deployment/k8s-manifest.yaml --namespace=${{ inputs.environment }}

    - name: 等待部署完成
      run: |
        kubectl rollout status deployment/novel-editor-backend --namespace=${{ inputs.environment }} --timeout=300s
        kubectl rollout status deployment/novel-editor-frontend --namespace=${{ inputs.environment }} --timeout=300s

    - name: 验证部署
      run: |
        echo "=== Pods Status ==="
        kubectl get pods -n ${{ inputs.environment }}
        
        echo "=== Services Status ==="
        kubectl get services -n ${{ inputs.environment }}
        
        echo "=== Ingress Status ==="
        kubectl get ingress -n ${{ inputs.environment }}

    - name: 健康检查
      run: |
        # 等待服务启动
        sleep 30
        
        # 检查后端健康状态
        BACKEND_POD=$(kubectl get pods -n ${{ inputs.environment }} -l app=novel-editor-backend -o jsonpath="{.items[0].metadata.name}")
        kubectl exec -n ${{ inputs.environment }} $BACKEND_POD -- curl -f http://localhost:8000/health
        
        # 检查前端是否响应
        FRONTEND_SERVICE=$(kubectl get service -n ${{ inputs.environment }} novel-editor-frontend -o jsonpath="{.spec.clusterIP}")
        kubectl run -n ${{ inputs.environment }} --rm -i --tty curl-test --image=curlimages/curl --restart=Never -- curl -f http://$FRONTEND_SERVICE:3000

    - name: 清理失败的部署
      if: failure()
      run: |
        echo "部署失败，回滚到上一个版本..."
        kubectl rollout undo deployment/novel-editor-backend --namespace=${{ inputs.environment }}
        kubectl rollout undo deployment/novel-editor-frontend --namespace=${{ inputs.environment }}

    - name: 部署结果通知
      if: always()
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "✅ 部署到 ${{ inputs.environment }} 环境成功"
        else
          echo "❌ 部署到 ${{ inputs.environment }} 环境失败"
        fi
