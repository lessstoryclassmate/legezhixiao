name: Monitoring & Alerts

on:
  schedule:
    - cron: '*/15 * * * *'  # 每15分钟运行一次
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [development, production]
    
    steps:
    - name: 健康检查 - ${{ matrix.environment }}
      run: |
        # 根据环境设置URL
        if [ "${{ matrix.environment }}" = "production" ]; then
          BACKEND_URL="https://api.novel-editor.com"
          FRONTEND_URL="https://novel-editor.com"
        else
          BACKEND_URL="https://dev-api.novel-editor.com"
          FRONTEND_URL="https://dev.novel-editor.com"
        fi
        
        echo "检查 ${{ matrix.environment }} 环境健康状态..."
        
        # 检查后端API
        BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $BACKEND_URL/health || echo "000")
        echo "Backend Status: $BACKEND_STATUS"
        
        # 检查前端
        FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $FRONTEND_URL || echo "000")
        echo "Frontend Status: $FRONTEND_STATUS"
        
        # 记录状态
        echo "backend_status=$BACKEND_STATUS" >> $GITHUB_ENV
        echo "frontend_status=$FRONTEND_STATUS" >> $GITHUB_ENV
        echo "environment=${{ matrix.environment }}" >> $GITHUB_ENV

    - name: 发送告警
      if: env.backend_status != '200' || env.frontend_status != '200'
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#alerts'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
        custom_payload: |
          {
            "text": "🚨 服务健康检查失败",
            "attachments": [
              {
                "color": "danger",
                "fields": [
                  {
                    "title": "环境",
                    "value": "${{ env.environment }}",
                    "short": true
                  },
                  {
                    "title": "后端状态",
                    "value": "${{ env.backend_status }}",
                    "short": true
                  },
                  {
                    "title": "前端状态", 
                    "value": "${{ env.frontend_status }}",
                    "short": true
                  },
                  {
                    "title": "时间",
                    "value": "$(date)",
                    "short": true
                  }
                ]
              }
            ]
          }

  performance-monitoring:
    runs-on: ubuntu-latest
    
    steps:
    - name: 性能监控
      run: |
        # 检查生产环境性能
        RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" https://api.novel-editor.com/health || echo "0")
        echo "API响应时间: ${RESPONSE_TIME}s"
        
        # 如果响应时间超过2秒，发送告警
        if (( $(echo "$RESPONSE_TIME > 2.0" | bc -l) )); then
          echo "performance_alert=true" >> $GITHUB_ENV
          echo "response_time=$RESPONSE_TIME" >> $GITHUB_ENV
        fi

    - name: 性能告警
      if: env.performance_alert == 'true'
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        channel: '#performance'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        custom_payload: |
          {
            "text": "⚠️ 性能告警",
            "attachments": [
              {
                "color": "warning",
                "fields": [
                  {
                    "title": "API响应时间",
                    "value": "${{ env.response_time }}s",
                    "short": true
                  },
                  {
                    "title": "阈值",
                    "value": "2.0s",
                    "short": true
                  }
                ]
              }
            ]
          }

  resource-monitoring:
    runs-on: ubuntu-latest
    
    steps:
    - name: 设置kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: 配置Kubernetes访问
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: 检查资源使用情况
      run: |
        echo "=== 节点资源使用情况 ==="
        kubectl top nodes
        
        echo "=== Pod资源使用情况 ==="
        kubectl top pods -n production
        
        echo "=== 存储使用情况 ==="
        kubectl get pv
        
        # 检查是否有资源使用过高的情况
        kubectl top pods -n production --no-headers | while read line; do
          POD_NAME=$(echo $line | awk '{print $1}')
          CPU_USAGE=$(echo $line | awk '{print $2}' | sed 's/m//')
          MEMORY_USAGE=$(echo $line | awk '{print $3}' | sed 's/Mi//')
          
          if [ "$CPU_USAGE" -gt 800 ] || [ "$MEMORY_USAGE" -gt 800 ]; then
            echo "high_resource_usage=true" >> $GITHUB_ENV
            echo "pod_name=$POD_NAME" >> $GITHUB_ENV
            echo "cpu_usage=${CPU_USAGE}m" >> $GITHUB_ENV
            echo "memory_usage=${MEMORY_USAGE}Mi" >> $GITHUB_ENV
            break
          fi
        done

    - name: 资源使用告警
      if: env.high_resource_usage == 'true'
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        channel: '#alerts'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        custom_payload: |
          {
            "text": "📊 资源使用告警",
            "attachments": [
              {
                "color": "warning",
                "fields": [
                  {
                    "title": "Pod名称",
                    "value": "${{ env.pod_name }}",
                    "short": true
                  },
                  {
                    "title": "CPU使用",
                    "value": "${{ env.cpu_usage }}",
                    "short": true
                  },
                  {
                    "title": "内存使用",
                    "value": "${{ env.memory_usage }}",
                    "short": true
                  }
                ]
              }
            ]
          }
