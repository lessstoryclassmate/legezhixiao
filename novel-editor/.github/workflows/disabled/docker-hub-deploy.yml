name: Docker Hub Auto Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.prod.yml'
  workflow_dispatch:

env:
  DOCKER_REGISTRY: docker.io

jobs:
  # 构建并推送到Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 检出代码
      uses: actions/checkout@v4

    - name: 🐳 设置Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔐 登录到Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: 📋 生成镜像标签
      id: meta
      run: |
        VERSION=${{ github.sha }}
        BACKEND_IMAGE="${{ secrets.DOCKER_HUB_USERNAME }}/novel-editor-backend"
        FRONTEND_IMAGE="${{ secrets.DOCKER_HUB_USERNAME }}/novel-editor-frontend"
        
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "backend-image=${BACKEND_IMAGE}" >> $GITHUB_OUTPUT
        echo "frontend-image=${FRONTEND_IMAGE}" >> $GITHUB_OUTPUT

    - name: 🏗️ 构建并推送后端镜像
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        target: production
        push: true
        tags: |
          ${{ steps.meta.outputs.backend-image }}:${{ steps.meta.outputs.version }}
          ${{ steps.meta.outputs.backend-image }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: 🏗️ 构建并推送前端镜像
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        target: production
        push: true
        tags: |
          ${{ steps.meta.outputs.frontend-image }}:${{ steps.meta.outputs.version }}
          ${{ steps.meta.outputs.frontend-image }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: 📝 生成部署文档
      run: |
        mkdir -p artifacts
        
        # 创建部署说明
        cat > artifacts/DOCKER_HUB_DEPLOY.md << EOF
        # Docker Hub部署说明
        
        ## 镜像信息
        - 后端镜像: \`${{ steps.meta.outputs.backend-image }}:latest\`
        - 前端镜像: \`${{ steps.meta.outputs.frontend-image }}:latest\`
        - 构建版本: \`${{ steps.meta.outputs.version }}\`
        - 构建时间: \`$(date -u +"%Y-%m-%d %H:%M:%S UTC")\`
        
        ## 快速部署
        
        ### 1. 下载部署文件
        \`\`\`bash
        curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.dockerhub.yml
        \`\`\`
        
        ### 2. 配置环境变量
        \`\`\`bash
        # 创建环境变量文件
        cat > .env << 'ENV_EOF'
        SILICONFLOW_API_KEY=your_api_key_here
        SECRET_KEY=your_secret_key_here
        DEFAULT_AI_MODEL=deepseek-ai/DeepSeek-V3
        DATABASE_URL=sqlite:///./novel_editor.db
        ENV_EOF
        \`\`\`
        
        ### 3. 启动服务
        \`\`\`bash
        docker-compose -f docker-compose.dockerhub.yml up -d
        \`\`\`
        
        ### 4. 验证部署
        \`\`\`bash
        # 检查服务状态
        docker-compose -f docker-compose.dockerhub.yml ps
        
        # 访问应用
        curl http://localhost:8000/health
        \`\`\`
        
        ## 管理命令
        
        \`\`\`bash
        # 查看日志
        docker-compose -f docker-compose.dockerhub.yml logs
        
        # 重启服务
        docker-compose -f docker-compose.dockerhub.yml restart
        
        # 停止服务
        docker-compose -f docker-compose.dockerhub.yml down
        
        # 更新到最新版本
        docker-compose -f docker-compose.dockerhub.yml pull
        docker-compose -f docker-compose.dockerhub.yml up -d
        \`\`\`
        
        ## 访问地址
        - 前端页面: http://localhost
        - API文档: http://localhost:8000/docs
        - 健康检查: http://localhost:8000/health
        EOF
        
        # 创建Docker Hub部署配置
        cat > artifacts/docker-compose.dockerhub.yml << EOF
        version: '3.8'
        
        services:
          backend:
            image: ${{ steps.meta.outputs.backend-image }}:latest
            container_name: novel-editor-backend
            restart: unless-stopped
            environment:
              - DEBUG=false
              - ENVIRONMENT=production
              - SILICONFLOW_API_KEY=\${SILICONFLOW_API_KEY}
              - DEFAULT_AI_MODEL=\${DEFAULT_AI_MODEL:-deepseek-ai/DeepSeek-V3}
              - SECRET_KEY=\${SECRET_KEY}
              - DATABASE_URL=\${DATABASE_URL:-sqlite:///./novel_editor.db}
            volumes:
              - novel_editor_data:/app/data
              - ./logs:/app/logs
            ports:
              - "8000:8000"
            healthcheck:
              test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 40s
        
          frontend:
            image: ${{ steps.meta.outputs.frontend-image }}:latest
            container_name: novel-editor-frontend
            restart: unless-stopped
            ports:
              - "80:80"
            depends_on:
              - backend
            healthcheck:
              test: ["CMD", "curl", "-f", "http://localhost/health"]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 30s
        
        volumes:
          novel_editor_data:
            driver: local
        EOF

    - name: 📦 上传部署文件
      uses: actions/upload-artifact@v3
      with:
        name: docker-hub-deploy
        path: artifacts/

    - name: 📢 创建Release
      if: github.ref == 'refs/heads/main'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          🚀 AI小说编辑器自动发布
          
          ## 📦 Docker镜像
          - 后端: `${{ steps.meta.outputs.backend-image }}:latest`
          - 前端: `${{ steps.meta.outputs.frontend-image }}:latest`
          
          ## 🎯 快速部署
          ```bash
          # 下载docker-compose文件
          curl -O https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/docker-compose.dockerhub.yml
          
          # 配置环境变量并启动
          echo "SILICONFLOW_API_KEY=your_key" > .env
          docker-compose -f docker-compose.dockerhub.yml up -d
          ```
          
          ## 📋 更新内容
          ${{ github.event.head_commit.message }}
          
          ## 🔗 相关链接
          - [Docker Hub - 后端](${{ env.DOCKER_REGISTRY }}/${{ steps.meta.outputs.backend-image }})
          - [Docker Hub - 前端](${{ env.DOCKER_REGISTRY }}/${{ steps.meta.outputs.frontend-image }})
          - [部署文档](./DOCKER_DEPLOYMENT.md)
        draft: false
        prerelease: false

    - name: 💬 部署成功通知
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author
        text: |
          🎉 AI小说编辑器Docker镜像构建成功！
          
          📦 最新镜像:
          • 后端: `${{ steps.meta.outputs.backend-image }}:latest`
          • 前端: `${{ steps.meta.outputs.frontend-image }}:latest`
          
          🚀 快速部署:
          ```
          curl -O https://github.com/${{ github.repository }}/releases/latest/download/docker-compose.dockerhub.yml
          docker-compose -f docker-compose.dockerhub.yml up -d
          ```

  # 发布到仓库
  publish-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 🚀 检出代码
      uses: actions/checkout@v4

    - name: 📥 下载部署文件
      uses: actions/download-artifact@v3
      with:
        name: docker-hub-deploy
        path: ./deploy

    - name: 📋 复制部署文件到仓库
      run: |
        cp deploy/docker-compose.dockerhub.yml .
        cp deploy/DOCKER_HUB_DEPLOY.md .

    - name: 📝 提交部署文件
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docker-compose.dockerhub.yml DOCKER_HUB_DEPLOY.md
        git commit -m "🐳 更新Docker Hub部署配置 [skip ci]" || exit 0
        git push
