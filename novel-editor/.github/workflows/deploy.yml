name: AI Novel Editor Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Baidu Cloud
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🔧 Setup Environment
      run: |
        echo "🚀 Starting deployment..."
        echo "Server: ${{ secrets.SERVER_IP }}"
        echo "User: ${{ secrets.SERVER_USER }}"
        
    - name: 📦 Create Production Config
      run: |
        cat > .env.prod << EOF
        DEBUG=false
        ENVIRONMENT=production
        DATABASE_PORT=3306
        DATABASE_SYSTEMIP=${{ secrets.DATABASE_SYSTEMIP }}
        DATABASE_SYSTEM=${{ secrets.DATABASE_SYSTEM }}
        DATABASE_USER=${{ secrets.DATABASE_USER }}
        DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
        DATABASE_NOVELIP=${{ secrets.DATABASE_NOVELIP }}
        DATABASE_NOVELDATA=${{ secrets.DATABASE_NOVELDATA }}
        DATABASE_NOVELUSER=${{ secrets.DATABASE_NOVELUSER }}
        DATABASE_NOVELUSER_PASSWORD=${{ secrets.DATABASE_NOVELUSER_PASSWORD }}
        SILICONFLOW_API_KEY=${{ secrets.SILICONFLOW_API_KEY }}
        SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
        EOF
        echo "✅ Production config created"

    - name: 🔐 Setup SSH
      if: ${{ secrets.SERVER_SSH_KEY && secrets.SERVER_IP }}
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
        echo "✅ SSH configured"

    - name: 🚀 Deploy to Server
      if: ${{ secrets.SERVER_SSH_KEY && secrets.SERVER_IP }}
      run: |
        # Upload files
        scp -r . ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/root/novel-editor/
        
        # Deploy on server
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
          cd /root/novel-editor
          docker-compose down || true
          docker-compose -f docker-compose.prod.yml up -d --build
          sleep 20
          docker-compose ps
          curl -f http://localhost:8000/health || echo "Health check pending..."
        EOF
        echo "✅ Deployment completed"

    - name: ✅ Deployment Summary
      run: |
        echo "🎉 Deployment Summary:"
        echo "- Frontend: http://${{ secrets.SERVER_IP }}"
        echo "- API Docs: http://${{ secrets.SERVER_IP }}:8000/docs"
        echo "- Health: http://${{ secrets.SERVER_IP }}:8000/health"
