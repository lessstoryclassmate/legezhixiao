name: 🔧 Auto-Fix Deployment Issues

on:
  workflow_run:
    workflows: ["🚀 Deploy to Baidu Cloud"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: 'GitHub Actions Run ID to analyze (optional)'
        required: false
        type: string

jobs:
  analyze-and-fix:
    name: 🤖 智能错误分析和修复
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event_name == 'workflow_dispatch' }}
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: 🐍 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 安装依赖
      run: |
        pip install requests

    - name: 🔍 分析部署错误
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        cd novel-editor
        python github-actions-analyzer.py

    - name: 📊 输出分析结果
      run: |
        if [ -f novel-editor/deployment-analysis-report.md ]; then
          echo "## 🤖 自动错误分析报告" >> $GITHUB_STEP_SUMMARY
          cat novel-editor/deployment-analysis-report.md >> $GITHUB_STEP_SUMMARY
        else
          echo "## ✅ 未检测到需要修复的错误" >> $GITHUB_STEP_SUMMARY
        fi

    - name: 🔧 应用自动修复
      run: |
        cd novel-editor
        
        # 运行所有生成的修复脚本
        if ls fix-*.sh 1> /dev/null 2>&1; then
          echo "🛠️ 发现修复脚本，开始应用修复..."
          
          for script in fix-*.sh; do
            echo "🔧 运行修复脚本: $script"
            chmod +x "$script"
            ./"$script" || echo "⚠️ 脚本 $script 执行失败"
          done
          
          echo "修复完成" > auto-fix-applied.txt
        else
          echo "ℹ️ 未发现需要应用的修复脚本"
        fi

    - name: 🚀 提交修复
      run: |
        cd novel-editor
        
        if [ -f auto-fix-applied.txt ]; then
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Auto-Fix"
          
          # 添加修复后的文件
          git add .
          
          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "ℹ️ 没有需要提交的变更"
          else
            # 提交修复
            git commit -m "🔧 自动修复部署问题
            
            - 自动检测并修复GitHub Actions部署错误
            - 应用智能错误分析建议的修复方案
            - 生成详细的分析报告和修复脚本
            
            Auto-generated by GitHub Actions Error Analyzer"
            
            # 推送修复
            git push
            
            echo "✅ 自动修复已提交并推送"
            echo "🔄 这将触发新的部署尝试"
          fi
        else
          echo "ℹ️ 没有应用任何修复，跳过提交"
        fi

    - name: 📋 创建Issue（如果需要手动干预）
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          let issueBody = `## 🚨 部署失败需要手动干预
          
          自动错误分析和修复系统检测到部署问题，但无法自动解决。
          
          **失败的工作流**: ${{ github.event.workflow_run.name || '手动触发' }}
          **运行ID**: ${{ github.event.workflow_run.id || github.event.inputs.run_id || 'N/A' }}
          **时间**: ${new Date().toISOString()}
          
          ## 🔍 建议检查项
          
          1. **GitHub Secrets配置**:
             - SERVER_SSH_KEY
             - SERVER_IP
             - SERVER_USER
             - 数据库相关配置
             - SILICONFLOW_API_KEY
          
          2. **服务器状态**:
             - SSH连接是否正常
             - Docker服务是否运行
             - 磁盘空间是否充足
             - 端口是否被占用
          
          3. **网络连接**:
             - 服务器网络是否正常
             - 防火墙设置
             - DNS解析
          
          ## 🛠️ 手动修复建议
          
          1. 检查并更新GitHub Secrets配置
          2. 在服务器上运行诊断命令
          3. 查看详细的错误日志
          4. 手动运行修复脚本
          
          ## 📁 相关文件
          
          查看仓库中的以下文件获取更多信息:
          - \`deployment-analysis-report.md\` - 详细分析报告
          - \`fix-*.sh\` - 自动生成的修复脚本
          - \`DOCKER_VERSION_COMPATIBILITY.md\` - Docker兼容性指南
          
          ---
          *此Issue由自动错误分析系统创建*`;
          
          // 检查是否存在分析报告
          const reportPath = 'novel-editor/deployment-analysis-report.md';
          if (fs.existsSync(reportPath)) {
            const report = fs.readFileSync(reportPath, 'utf8');
            issueBody += `\n\n## 📊 详细分析报告\n\n${report}`;
          }
          
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🚨 部署失败 - ${new Date().toISOString().split('T')[0]}`,
            body: issueBody,
            labels: ['bug', 'deployment', 'auto-generated']
          });

    - name: 📤 上传分析结果
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: deployment-analysis-results
        path: |
          novel-editor/deployment-analysis-report.md
          novel-editor/fix-*.sh
          novel-editor/auto-fix-applied.txt
        retention-days: 7

    - name: 💬 发送通知
      if: always()
      run: |
        if [ -f novel-editor/auto-fix-applied.txt ]; then
          echo "🔧 ✅ 自动修复已应用并提交"
          echo "🔄 新的部署将自动开始"
        else
          echo "🤖 ℹ️ 错误分析完成，但无需自动修复"
          echo "📋 请查看分析报告了解详情"
        fi
